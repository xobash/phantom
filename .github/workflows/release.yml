name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Phantom/Phantom.csproj -r win-x64

      - name: Publish ReadyToRun
        run: dotnet publish Phantom/Phantom.csproj -c Release -r win-x64 --self-contained true --no-restore -p:PublishSingleFile=false -p:PublishReadyToRun=true -p:PublishTrimmed=false -o artifacts/phantom-win-x64

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path artifacts/phantom-win-x64/* -DestinationPath artifacts/phantom-win-x64.zip -Force

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          $tag = if ([string]::IsNullOrWhiteSpace($env:DISPATCH_TAG)) { $env:GITHUB_REF_NAME } else { $env:DISPATCH_TAG }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag is required.'
          }

          $asset = 'artifacts/phantom-win-x64.zip'
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title "Phantom $tag" --notes "ReadyToRun Windows x64 build."
          }
