name: windows-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  windows-ci:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Phantom.Tests/Phantom.Tests.csproj

      - name: Build
        run: dotnet build Phantom.Tests/Phantom.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test Phantom.Tests/Phantom.Tests.csproj --configuration Release --no-build --verbosity normal
